    <script>
      // Patch WebSocket to silently swallow Vite HMR fallback connections to invalid URLs.
      // This MUST run before ANY other script so Vite's @vite/client uses the patched constructor.
      (function() {
        var OrigWS = window.WebSocket;
        function PatchedWS(url, protocols) {
          // Vite falls back to wss://localhost:undefined/ when HMR host is unknown in Replit.
          // Silently fail by returning a dummy inert WebSocket-like object instead of throwing.
          if (typeof url === 'string' && url.indexOf('localhost:undefined') !== -1) {
            // Return an inert object that looks like a WebSocket but never connects
            var dummy = Object.create(OrigWS.prototype);
            dummy.readyState = 3; // CLOSED
            dummy.url = url;
            dummy.protocol = '';
            dummy.bufferedAmount = 0;
            dummy.extensions = '';
            dummy.binaryType = 'blob';
            dummy.send = function() {};
            dummy.close = function() {};
            dummy.addEventListener = function() {};
            dummy.removeEventListener = function() {};
            dummy.dispatchEvent = function() { return false; };
            dummy.onopen = null;
            dummy.onerror = null;
            dummy.onclose = null;
            dummy.onmessage = null;
            // Dispatch close event asynchronously so Vite thinks connection was refused
            setTimeout(function() {
              if (typeof dummy.onclose === 'function') {
                dummy.onclose({ code: 1006, reason: '', wasClean: false });
              }
            }, 0);
            return dummy;
          }
          if (protocols !== undefined) {
            return new OrigWS(url, protocols);
          }
          return new OrigWS(url);
        }
        PatchedWS.prototype = OrigWS.prototype;
        PatchedWS.CONNECTING = 0;
        PatchedWS.OPEN = 1;
        PatchedWS.CLOSING = 2;
        PatchedWS.CLOSED = 3;
        window.WebSocket = PatchedWS;
      })();
    </script>
    
    <style>
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      @media (prefers-color-scheme: dark) {
        #initial-loader {
          background: #0a0a0a;
        }
        #initial-loader .loader-text {
          color: #ffffff;
        }
      }
      #initial-loader .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e5e5e5;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @media (prefers-color-scheme: dark) {
        #initial-loader .loader-spinner {
          border-color: #333;
          border-top-color: #3b82f6;
        }
      }
      #initial-loader .loader-text {
        margin-top: 16px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        color: #666;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      #initial-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader-spinner"></div>
      <div class="loader-text">Loading...</div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      window.addEventListener('load', function() {
        var loader = document.getElementById('initial-loader');
        if (loader) {
          loader.classList.add('fade-out');
          setTimeout(function() {
            loader.remove();
          }, 300);
        }
      });
    </script>

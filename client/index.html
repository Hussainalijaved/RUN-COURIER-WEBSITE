    <script>
      // Wrap WebSocket constructor to silently swallow Vite HMR fallback URL errors in Replit.
      // Vite falls back to wss://localhost:undefined/ which throws a SyntaxError — this prevents
      // that error from reaching the runtime error overlay and causing page reloads.
      (function() {
        var OrigWS = window.WebSocket;
        window.WebSocket = function(url, protocols) {
          try {
            var ws = protocols !== undefined ? new OrigWS(url, protocols) : new OrigWS(url);
            return ws;
          } catch(e) {
            // Return a plain inert object so Vite's HMR code doesn't null-crash.
            // This silently absorbs the invalid-URL fallback without triggering error overlays.
            var noop = function(){};
            return {
              readyState: 3,
              send: noop, close: noop,
              addEventListener: noop, removeEventListener: noop, dispatchEvent: noop
            };
          }
        };
        window.WebSocket.prototype = OrigWS.prototype;
        window.WebSocket.CONNECTING = 0;
        window.WebSocket.OPEN = 1;
        window.WebSocket.CLOSING = 2;
        window.WebSocket.CLOSED = 3;
      })();
    </script>
    
    <style>
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      @media (prefers-color-scheme: dark) {
        #initial-loader {
          background: #0a0a0a;
        }
        #initial-loader .loader-text {
          color: #ffffff;
        }
      }
      #initial-loader .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e5e5e5;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @media (prefers-color-scheme: dark) {
        #initial-loader .loader-spinner {
          border-color: #333;
          border-top-color: #3b82f6;
        }
      }
      #initial-loader .loader-text {
        margin-top: 16px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        color: #666;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      #initial-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader-spinner"></div>
      <div class="loader-text">Loading...</div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      window.addEventListener('load', function() {
        var loader = document.getElementById('initial-loader');
        if (loader) {
          loader.classList.add('fade-out');
          setTimeout(function() {
            loader.remove();
          }, 300);
        }
      });
    </script>
